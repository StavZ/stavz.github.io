    <style type="text/css">
        /*! Preloader */

        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #252525;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            position: relative;
            border: 4px solid #Fff;
            animation: loader 2s infinite ease;
        }

        .loader-inner {
            vertical-align: top;
            display: inline-block;
            width: 100%;
            background-color: #fff;
            animation: loader-inner 2s infinite ease-in;
        }

        @keyframes loader {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(180deg);
            }

            50% {
                transform: rotate(180deg);
            }

            75% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes loader-inner {
            0% {
                height: 0%;
            }

            25% {
                height: 0%;
            }

            50% {
                height: 100%;
            }

            75% {
                height: 100%;
            }

            100% {
                height: 0%;
            }
        }

        body {
            background-image: url('../img/site-background-4k.png');
            color: #bbbbbb
        }

        a {
            color: #444444
        }

        a:hover {
            color: #af75d7;
            text-decoration: none;
        }


        .brand-text {
            fill: #333;
        }

        .brand-main {
            fill: #af75d7;
        }

        .nav-masthead .nav-link {
            font-weight: 500;
            color: #9E9E9E;
        }

        .nav-masthead .active {
            color: #cacaca;
        }
        .masthead-brand {
            color: #dddddd;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            color: #af75d7;
            border-bottom: none;
        }
        .project {
            max-width: 330px;
            display: inline-flex;
        }
        .project-info {
            text-align: left;
            margin-left: 20px;
        }
        .project-info a {

        .project-info p {

        .project-icon {

            border: none;
            width: 5rem;
            height: 5rem;
        }
        main {
            background-color: rgba(0,0,0, 0.2)
        }
    </style>
