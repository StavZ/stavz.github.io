<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="icon" href="img/site_icon.png">
    <link rel="stylesheet" href="style/bootstrap.css">
    <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

    <script>
        console.log(document.getElementsByClassName('loader-wrapper'))
        $(window).on("load", () => {
            $(".loader-wrapper").fadeOut("slow");
        });
    </script>
    <style>
        /*! Preloader */

        .loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #252525;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            position: relative;
            border: 4px solid #Fff;
            animation: loader 2s infinite ease;
        }

        .loader-inner {
            vertical-align: top;
            display: inline-block;
            width: 100%;
            background-color: #fff;
            animation: loader-inner 2s infinite ease-in;
        }

        @keyframes loader {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(180deg);
            }

            50% {
                transform: rotate(180deg);
            }

            75% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes loader-inner {
            0% {
                height: 0%;
            }

            25% {
                height: 0%;
            }

            50% {
                height: 100%;
            }

            75% {
                height: 100%;
            }

            100% {
                height: 0%;
            }
        }

        body {
            background-image: url('img/site-background-4k.png');
            color: #bbbbbb
        }

        a {
            color: #444444
        }

        a:hover {
            color: #af75d7;
            text-decoration: none;
        }


        .brand-text {
            fill: #333;
        }

        .brand-main {
            fill: #af75d7;
        }

        .nav-masthead .nav-link {
            font-weight: 500;
            color: #9E9E9E;
        }

        .nav-masthead .active {
            color: #cacaca;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            color: #af75d7;
            border-bottom: none;
        }

        .social a {
            background-color: rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 100%;
            line-height: 2.5rem;
            color: #bbbbbb;
            font-size: 20px;
        }

        .social a:hover {
            color: #af75d7;
        }

        .social a:active {
            color: #fff;
        }

        .social span {
            font-size: 20px;
        }
        .masthead-brand {
            color: #dddddd;
        }
        a.masthead-brand:hover {
            text-decoration: none;
        }
    </style>
</head>

<body class="text-center">
