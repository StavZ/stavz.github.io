  <style>
    @import url('https://fonts.googleapis.com/css2?family=Recursive&display=swap');
    /*! Preloader */

    .loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #252525;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .loader {
      display: inline-block;
      width: 30px;
      height: 30px;
      position: relative;
      border: 4px solid #Fff;
      animation: loader 2s infinite ease;
    }

    .loader-inner {
      vertical-align: top;
      display: inline-block;
      width: 100%;
      background-color: #fff;
      animation: loader-inner 2s infinite ease-in;
    }

    @keyframes loader {
      0% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(180deg);
      }

      50% {
        transform: rotate(180deg);
      }

      75% {
        transform: rotate(360deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes loader-inner {
      0% {
        height: 0%;
      }

      25% {
        height: 0%;
      }

      50% {
        height: 100%;
      }

      75% {
        height: 100%;
      }

      100% {
        height: 0%;
      }
    }

    /*! Preloader end */

    .dropdown-menu {
      color: #F5F5F5;
      background-color: #212121;
    }

    .dropdown-item {
      color: #f5f5f5;
    }

    .dropdown-item:hover,
    .dropdown-item:focus {
      color: #f5f5f5;
      background-color: rgba(244, 67, 54, 0.5);
    }

    .dropdown-item.active,
    .dropdown-item:active {
      color: #fff;
      background-color: #f44336;
    }

    body {
      font-family: 'Recursive' !important;
      background-image: url("img/site-background.png");
    }

    .container {
      width: 70%;
    }

    a,
    a:focus,
    a:hover {
      color: #fff !important;
    }

    /*! navbar */

    /* nav.tranparent {

} */

      margin-top: 30px;
      position: absolute;
      left: 50%;
      transform: translatex(-50%);
    }
  </style>
</head>
