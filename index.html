<!DOCTYPE html>

<head>
  <!-- Meta -->

  <meta charset="utf-8">

  <!-- Styles -->

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- Scripts -->
  <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
    integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
    integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
    crossorigin="anonymous"></script>
  <script>
    console.log(document.getElementsByClassName('loader-wrapper'))
    $(window).on("load", () => {
      $(".loader-wrapper").fadeOut("slow");
    });
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Recursive&display=swap');
    /*! Preloader */

    .loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #252525;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .loader {
      display: inline-block;
      width: 30px;
      height: 30px;
      position: relative;
      border: 4px solid #Fff;
      animation: loader 2s infinite ease;
    }

    .loader-inner {
      vertical-align: top;
      display: inline-block;
      width: 100%;
      background-color: #fff;
      animation: loader-inner 2s infinite ease-in;
    }

    @keyframes loader {
      0% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(180deg);
      }

      50% {
        transform: rotate(180deg);
      }

      75% {
        transform: rotate(360deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes loader-inner {
      0% {
        height: 0%;
      }

      25% {
        height: 0%;
      }

      50% {
        height: 100%;
      }

      75% {
        height: 100%;
      }

      100% {
        height: 0%;
      }
    }

    /*! Preloader end */

    body {
      font-family: 'Recursive' sans-serif;
      background-image: url("img/site-background-4k.png");
    }

    .container {
      width: 70%;
    }

    a,
    a:focus,
    a:hover {
      color: #fff !important;
    }

    /*! navbar */

    nav.tranparent {
      border: none ;
      background-color: rgba(0, 0, 0, 0);
    }


    .navbar-nav {
      text-align: center;
    }

    li {
      text-align: center;
      float: none;
      display: inline-block;
    }

    footer {
      text-align: center;
      color: #fff;
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 2.1rem;
      font-size: 12px;
      padding: 0;
      border: none;
    }
    @media (min-width: 768) {
      body {
        scale: 150%;
      }
    }
  </style>
</head>

<body class="text-center">
  <!-- Loader -->
  <div class="loader-wrapper">
    <span class="loader"><span class="loader-inner"></span></span>
  </div>

  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <a href="https://stavzdev.xyz" class="navbar-brand">StavZDev</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="navbar-collapse collapse" id="navbarSupportedContent" style="width: 40px;">
        <ul class="nav navbar-nav mr-auto navbar-center">
          <li class="nav-item active">
            <a class="nav-link active" href="#">Home</a>
          </li>
          <li class="navbar-nav"><a href="projects/index.html" class="nav-link">Projects</a></li>
          <li class="navbar-nav"><a class="nav-link" href="/about/">About</a></li>
        </ul>
      </div>
    </nav>
  </div>
  <footer>
    <p>Copyright <span class="iconify" data-icon="bx:bx-copyright" data-inline="false"></span> 2020 StavZDev</p>
  </footer>
</body>

</html>
